<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Reactions - Botbath</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFDFB;
            color: #2A2A2A;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 32px;
            text-align: center;
        }
        
        .cat-photo {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 40px;
            display: block;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .reactions {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .bot-reaction {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .bot-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .bot-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .bot-vote {
            font-size: 24px;
        }
        
        .bot-vote.up {
            color: #22C55E;
        }
        
        .bot-vote.down {
            color: #EF4444;
        }
        
        .bot-comment {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
        }
        
        .share-section {
            margin-top: 48px;
            text-align: center;
        }
        
        .share-btn {
            padding: 16px 48px;
            background: #2A2A2A;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .share-btn:hover {
            background: #000;
            transform: translateY(-2px);
        }
        
        .upload-another {
            margin-top: 16px;
        }
        
        .upload-another a {
            color: #666;
            text-decoration: none;
        }
        
        .upload-another a:hover {
            color: #2A2A2A;
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
            font-size: 20px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 80px 20px;
        }
        
        .error-text {
            font-size: 20px;
            color: #EF4444;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 What the Bots Think</h1>
        
        <div id="loading" class="loading">
            Loading reactions...
        </div>
        
        <div id="error" class="error" style="display: none;">
            <div class="error-text">Oops! Couldn't load results.</div>
            <a href="/">Try uploading another cat</a>
        </div>
        
        <div id="results" style="display: none;">
            <img id="catPhoto" class="cat-photo" src="" alt="Your cat">
            
            <div class="reactions" id="reactions">
                <!-- Bot reactions will be inserted here -->
            </div>
            
            <div class="share-section">
                <button class="share-btn" id="shareBtn">Share Results</button>
                <div class="upload-another">
                    <a href="/">Upload another cat →</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get cat ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const catId = urlParams.get('id');
        
        if (!catId) {
            showError();
        } else {
            loadResults();
        }
        
        async function loadResults() {
            try {
                const response = await fetch(`/.netlify/functions/get-cat?id=${catId}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                displayResults(data);
                
            } catch (error) {
                console.error('Error loading results:', error);
                showError();
            }
        }
        
        function displayResults(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            // Show cat photo
            document.getElementById('catPhoto').src = data.imageUrl;
            
            // Display bot reactions
            const reactionsContainer = document.getElementById('reactions');
            
            const bots = [
                { name: '🟣 Claude', reaction: data.reactions.claude },
                { name: '🟢 GPT', reaction: data.reactions.gpt },
                { name: '🔵 Gemini', reaction: data.reactions.gemini }
            ];
            
            bots.forEach(bot => {
                const reactionDiv = document.createElement('div');
                reactionDiv.className = 'bot-reaction';
                
                const voteClass = bot.reaction.vote === 'up' ? 'up' : 'down';
                const voteEmoji = bot.reaction.vote === 'up' ? '⬆️' : '⬇️';
                
                reactionDiv.innerHTML = `
                    <div class="bot-header">
                        <div class="bot-name">${bot.name}</div>
                        <div class="bot-vote ${voteClass}">${voteEmoji}</div>
                    </div>
                    <div class="bot-comment">"${bot.reaction.comment}"</div>
                `;
                
                reactionsContainer.appendChild(reactionDiv);
            });
        }
        
        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
        
        // Share functionality
        document.getElementById('shareBtn').addEventListener('click', async () => {
            const shareText = `AI bots just rated my cat! See what they think of yours at botbath.netlify.app`;
            const shareUrl = window.location.href;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'My Cat on Botbath',
                        text: shareText,
                        url: shareUrl
                    });
                } catch (err) {
                    // User cancelled or error occurred
                    copyToClipboard(shareUrl);
                }
            } else {
                copyToClipboard(shareUrl);
            }
        });
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Link copied! Share it anywhere.');
            }).catch(() => {
                // Fallback: show the URL
                prompt('Copy this link:', text);
            });
        }
    </script>
</body>
</html>
