<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botbath - AI Bots Rate Your Cat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFDFB;
            color: #2A2A2A;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2A2A2A;
        }
        
        .tagline {
            font-size: 20px;
            color: #666;
            margin-bottom: 48px;
        }
        
        .upload-box {
            background: white;
            border: 3px dashed #DDD;
            border-radius: 24px;
            padding: 60px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-box:hover {
            border-color: #2A2A2A;
            transform: translateY(-2px);
        }
        
        .upload-box.dragging {
            border-color: #2A2A2A;
            background: #F5F5F5;
        }
        
        .upload-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .upload-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .upload-subtext {
            font-size: 14px;
            color: #999;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .preview {
            margin-top: 32px;
            display: none;
        }
        
        .preview img {
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .submit-btn {
            margin-top: 24px;
            padding: 16px 48px;
            background: #2A2A2A;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            background: #000;
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            background: #CCC;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            margin-top: 24px;
            font-size: 18px;
            color: #666;
        }
        
        .loading.active {
            display: block;
        }
        
        footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #EEE;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Botbath</h1>
        <p class="tagline">See what AI bots think of your cat</p>
        
        <div class="upload-box" id="uploadBox">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click to upload a cat photo</div>
            <div class="upload-subtext">or drag and drop</div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <div class="preview" id="preview">
            <img id="previewImg" src="" alt="Your cat">
            <button class="submit-btn" id="submitBtn">Get Bot Reactions</button>
        </div>
        
        <div class="loading" id="loading">
            🤖 Asking the bots what they think...
        </div>
        
        <footer>
            <div style="margin-bottom: 12px; font-size: 12px;">
                Powered by Claude, GPT, and Gemini
            </div>
            <div>© 2026 Botbath</div>
        </footer>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        
        let selectedFile = null;
        
        // Click to upload
        uploadBox.addEventListener('click', () => {
            fileInput.click();
        });
        
        // File selected
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });
        
        // Drag and drop
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragging');
        });
        
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragging');
        });
        
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragging');
            handleFile(e.dataTransfer.files[0]);
        });
        
        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                alert('Please upload an image file');
                return;
            }
            
            selectedFile = file;
            
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                preview.style.display = 'block';
                uploadBox.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
        
        // Submit to get bot reactions
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            submitBtn.disabled = true;
            loading.classList.add('active');
            
            try {
                // Convert image to base64
                const base64 = await fileToBase64(selectedFile);
                
                // Call Netlify function
                const response = await fetch('/.netlify/functions/rate-cat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: base64,
                        mimeType: selectedFile.type
                    })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                // Redirect to results page
                window.location.href = `/results.html?id=${result.catId}`;
                
            } catch (error) {
                console.error('Error:', error);
                alert('Oops! Something went wrong. Please try again.');
                submitBtn.disabled = false;
                loading.classList.remove('active');
            }
        });
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    // Remove data URL prefix to get just base64
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
